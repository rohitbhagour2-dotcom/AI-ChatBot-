<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #ece5dd;
    margin: 0;
    padding: 0;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background-color: #ffffff;
  }

  .header {
    background-color: #075E54;
    color: white;
    padding: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .robot-icon {
    width: 36px;
    height: 36px;
    background-color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .header-title {
    font-size: 18px;
    font-weight: bold;
  }

  .clear-btn {
    background-color: transparent;
    border: 1px solid white;
    color: white;
    padding: 6px 12px;
    border-radius: 15px;
    font-size: 12px;
    cursor: pointer;
  }

  .clear-btn:hover {
    background-color: rgba(255,255,255,0.15);
  }

  .chat-box {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .message {
    max-width: 75%;
    padding: 8px 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.4;
  }

  .bot-msg {
    background-color: #ffffff;
    border: 1px solid #ddd;
    align-self: flex-start;
  }

  .user-msg {
    background-color: #dcf8c6;
    align-self: flex-end;
  }

  .input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ccc;
  }

  #userInput {
    flex: 1;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 20px;
    outline: none;
    font-size: 14px;
  }

  #sendBtn {
    margin-left: 8px;
    padding: 10px 18px;
    background-color: #075E54;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-left">
      <div class="robot-icon">🤖</div>
      <div class="header-title">Chatbot</div>
    </div>
    <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="message bot-msg">Hi! I am a simple chatbot. Type "help" to see what I can answer.</div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter'){sendMessage();}">
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
// This function clears all messages and shows the starting message again
function clearChat() {
  var chatBox = document.getElementById("chatBox");
  chatBox.innerHTML = "";
  addMessage('Hi! I am a simple chatbot. Type "help" to see what I can answer.', "bot");
}

// This function adds a message bubble to the chat box
function addMessage(text, sender) {
  var chatBox = document.getElementById("chatBox");
  var msgDiv = document.createElement("div");
  msgDiv.classList.add("message");

  if (sender === "user") {
    msgDiv.classList.add("user-msg");
  } else {
    msgDiv.classList.add("bot-msg");
  }

  msgDiv.innerText = text;
  chatBox.appendChild(msgDiv);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// This function decides what the bot should reply based on keywords
function getBotReply(input) {
  var msg = input.toLowerCase();

  if (msg.includes("hello") || msg.includes("hi")) {
    return "Hello! How can I help you?";
  }
  else if (msg.includes("how are you")) {
    return "I am doing good, thank you for asking!";
  }
  else if (msg.includes("your name")) {
    return "I am a simple rule-based chatbot made for a college project.";
  }
  else if (msg.includes("my name is")) {
    return "Nice to meet you!";
  }
  else if (msg.includes("time")) {
    var now = new Date();
    return "Right now it is " + now.getHours() + ":" + now.getMinutes();
  }
  else if (msg.includes("date")) {
    var today = new Date();
    return "Today's date is " + today.toDateString();
  }
  else if (msg.includes("thank")) {
    return "You're welcome!";
  }
  else if (msg.includes("weather")) {
    return "Sorry, I can't check live weather, but I hope it's nice outside.";
  }
  else if (msg.includes("help")) {
    return "You can try asking: hello, how are you, your name, time, date, weather, or thank you.";
  }
  else if (msg.includes("bye")) {
    return "Goodbye! Take care.";
  }
  else {
    return "Sorry, I did not understand that. Type 'help' to see what I can answer.";
  }
}

// This function runs when the user clicks Send or presses Enter
function sendMessage() {
  var inputBox = document.getElementById("userInput");
  var userText = inputBox.value.trim();

  if (userText === "") {
    return;
  }

  addMessage(userText, "user");

  var reply = getBotReply(userText);

  // small delay so it feels more natural
  setTimeout(function () {
    addMessage(reply, "bot");
  }, 400);

  inputBox.value = "";
}
</script>

</body>
</html>
